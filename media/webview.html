<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https: data:; script-src 'nonce-{{nonce}}' https://d3js.org https://cdn.jsdelivr.net; style-src 'nonce-{{nonce}}'; connect-src https:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showy Project Map</title>
  <script nonce="{{nonce}}" src="https://d3js.org/d3.v7.min.js"></script>
  <style nonce="{{nonce}}">
    :root {
      color-scheme: light dark;
      font-family: Segoe UI, sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr 1fr 0.8fr;
      height: 100vh;
      overflow: hidden;
      gap: 0;
    }
    header {
      grid-column: 1 / -1;
      padding: 12px 16px;
      background: #1e1e1e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }
    header button {
      background: #0e639c;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }
    header button:hover {
      background: #1177bb;
    }
    .view-tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .view-tabs button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: #d4d4d4;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
    }
    .view-tabs button.active {
      background: #0e639c;
      border-color: #0e639c;
      color: white;
    }
    #tree-container {
      overflow: auto;
      padding: 16px;
      background: #252526;
      color: #d4d4d4;
      display: none;
    }
    #tree-container.active {
      display: block;
    }
    #graph-container {
      background: #252526;
      display: none;
      position: relative;
      overflow: hidden;
    }
    #graph-container.active {
      display: block;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
    }
    .node {
      cursor: pointer;
      stroke: rgba(255,255,255,0.2);
      stroke-width: 1.5px;
    }
    .node:hover {
      stroke: rgba(255,255,255,0.8);
      stroke-width: 2px;
    }
    .link {
      stroke: rgba(100,150,200,0.4);
      stroke-width: 1px;
    }
    .node-label {
      font-size: 11px;
      fill: #d4d4d4;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }
    #details {
      padding: 16px;
      border-left: 1px solid rgba(255,255,255,0.08);
      background: #1e1e1e;
      color: #d4d4d4;
      overflow: auto;
    }
    #details h2 {
      margin-top: 0;
      font-size: 14px;
    }
    #details h3 {
      font-size: 12px;
      margin: 12px 0 6px 0;
      color: #9cdcfe;
    }
    #details p {
      font-size: 12px;
      margin: 4px 0;
      word-break: break-all;
    }
    #status {
      padding: 8px 16px;
      color: #9cdcfe;
      font-size: 11px;
      background: rgba(0,0,0,0.3);
    }
    ul.tree {
      list-style: none;
      padding-left: 18px;
      margin: 0;
    }
    li.node {
      margin: 4px 0;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    li.node .label {
      cursor: pointer;
      user-select: none;
      padding: 4px 6px;
      border-radius: 4px;
    }
    li.node .label:hover {
      background: rgba(255,255,255,0.08);
    }
    li.node.folder > .label::before {
      content: '▸';
      display: inline-block;
      width: 16px;
      transform: rotate(0deg);
      transition: transform 0.2s ease;
    }
    li.node.expanded > .label::before {
      transform: rotate(90deg);
    }
    li.node.folder > ul {
      display: none;
      margin-left: 14px;
    }
    li.node.expanded > ul {
      display: block;
    }
    .node-meta {
      color: #9cdcfe;
      font-size: 0.9rem;
    }
    pre {
      background: rgba(255,255,255,0.04);
      padding: 8px;
      border-radius: 4px;
      overflow: auto;
      font-size: 11px;
      margin: 0;
    }
    .dep-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .dep-list li {
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .dep-list li:last-child {
      border-bottom: none;
    }
    .dep-import {
      color: #9cdcfe;
      font-family: monospace;
    }
    .dep-resolved {
      color: #6a9955;
      font-size: 10px;
      word-break: break-all;
    }
    .dep-unresolved {
      color: #808080;
      font-size: 10px;
      font-style: italic;
    }
    .graph-legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(30,30,30,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 11px;
      color: #d4d4d4;
      pointer-events: none;
    }
    .graph-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
    }
    .graph-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌳 Showy Project Map</h1>
    <div class="view-tabs">
      <button id="treeViewBtn" class="active">Tree</button>
      <button id="graphViewBtn">Graph</button>
    </div>
    <button id="refreshButton">Refresh</button>
  </header>
  <div id="tree-container" class="active">
    <div id="status">Loading workspace tree...</div>
    <div id="tree"></div>
  </div>
  <div id="graph-container">
    <svg id="graph-svg"></svg>
    <div class="graph-legend">
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#6a9fb5"></div> No dependencies</div>
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#b8a538"></div> Some dependencies</div>
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:#d94949"></div> Many dependencies (&gt;5)</div>
    </div>
  </div>
  <div id="details">
    <h2>Details</h2>
    <div id="detailContent">Select a file or node to see details.</div>
  </div>
  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const treeRoot = document.getElementById('tree');
    const graphContainer = document.getElementById('graph-container');
    const graphSvg = document.getElementById('graph-svg');
    const detailContent = document.getElementById('detailContent');
    const statusBar = document.getElementById('status');
    const refreshButton = document.getElementById('refreshButton');
    const treeViewBtn = document.getElementById('treeViewBtn');
    const graphViewBtn = document.getElementById('graphViewBtn');
    const treeContainer = document.getElementById('tree-container');

    let currentGraphData = null;
    let circularDeps = [];
    let d3Available = typeof d3 !== 'undefined';

    treeViewBtn.addEventListener('click', () => {
      treeContainer.classList.add('active');
      graphContainer.classList.remove('active');
      treeViewBtn.classList.add('active');
      graphViewBtn.classList.remove('active');
    });

    graphViewBtn.addEventListener('click', () => {
      if (!currentGraphData) {
        statusBar.textContent = '⚠️ Graph data not yet loaded. Please wait for tree to load.';
        return;
      }
      treeContainer.classList.remove('active');
      graphContainer.classList.add('active');
      treeViewBtn.classList.remove('active');
      graphViewBtn.classList.add('active');
      renderGraph();
    });

    refreshButton.addEventListener('click', () => {
      vscode.postMessage({ command: 'refresh' });
      statusBar.textContent = 'Refreshing project tree...';
      currentGraphData = null;
      d3.select(graphSvg).selectAll('*').remove();
    });

    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.type) {
        case 'treeData':
          renderTree(message.tree);
          break;
        case 'graphData':
          currentGraphData = message.graph;
          statusBar.textContent = 'Graph loaded: ' + currentGraphData.stats.totalFiles + ' files, ' + currentGraphData.stats.totalDependencies + ' dependencies.';
          break;
        case 'circularDependencies':
          circularDeps = message.circles;
          break;
        case 'nodeStats':
          showStats(message.stats);
          break;
        case 'status':
          statusBar.textContent = message.text;
          break;
      }
    });

    vscode.postMessage({ command: 'ready' });

    function renderTree(nodes) {
      treeRoot.innerHTML = '';
      if (!Array.isArray(nodes) || nodes.length === 0) {
        treeRoot.textContent = 'No workspace folders found.';
        return;
      }
      const treeElement = document.createElement('ul');
      treeElement.className = 'tree';
      for (const node of nodes) {
        treeElement.appendChild(createNodeElement(node));
      }
      treeRoot.appendChild(treeElement);
    }

    function createNodeElement(node) {
      const item = document.createElement('li');
      item.className = 'node ' + node.type;

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = node.name;
      label.title = node.path;

      if (node.type === 'folder') {
        const meta = document.createElement('span');
        meta.className = 'node-meta';
        meta.textContent = ' (' + (node.childCount ?? 0) + ' items)';
        label.appendChild(meta);
      }

      label.addEventListener('click', () => {
        if (node.type === 'folder') {
          item.classList.toggle('expanded');
        }
        vscode.postMessage({ command: 'nodeSelected', path: node.path });
      });

      item.appendChild(label);

      if (node.children && node.children.length > 0) {
        const childList = document.createElement('ul');
        childList.className = 'tree';
        for (const child of node.children) {
          childList.appendChild(createNodeElement(child));
        }
        item.appendChild(childList);
      }

      return item;
    }

    function renderGraph() {
      if (!currentGraphData || !d3Available) {
        detailContent.innerHTML = '<p>Graph data not available or D3.js not loaded.</p>';
        return;
      }

      const width = graphContainer.clientWidth;
      const height = graphContainer.clientHeight;

      d3.select(graphSvg).selectAll('*').remove();

      const nodes = currentGraphData.nodes.map((n, i) => ({
        id: n.id,
        path: n.path,
        label: n.path.split('/').pop() || n.path,
        index: i
      }));

      const links = [];
      for (const node of currentGraphData.nodes) {
        for (const depPath of node.dependencies) {
          const targetNode = nodes.find(n => n.path === depPath);
          if (targetNode) {
            links.push({
              source: node.id,
              target: targetNode.id,
            });
          }
        }
      }

      const svg = d3.select(graphSvg)
        .attr('width', width)
        .attr('height', height)
        .attr('style', 'background: #252526;');

      const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links)
          .id(d => d.id)
          .distance(80)
          .strength(0.3))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collide', d3.forceCollide(30));

      const link = svg.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('class', 'link')
        .attr('stroke', 'rgba(100,150,200,0.3)')
        .attr('stroke-width', 1);

      const node = svg.append('g')
        .selectAll('circle')
        .data(nodes)
        .join('circle')
        .attr('class', 'node')
        .attr('r', 8)
        .attr('fill', d => {
          const depCount = currentGraphData.nodes.find(n => n.id === d.id).dependencies.length;
          if (depCount === 0) return '#6a9fb5';
          if (depCount > 5) return '#d94949';
          return '#b8a538';
        })
        .call(drag(simulation));

      const label = svg.append('g')
        .selectAll('text')
        .data(nodes)
        .join('text')
        .attr('class', 'node-label')
        .attr('font-size', '10px')
        .text(d => d.label)
        .call(drag(simulation));

      node.on('click', (event, d) => {
        const nodeData = currentGraphData.nodes.find(n => n.id === d.id);
        if (nodeData) {
          vscode.postMessage({ command: 'nodeSelected', path: nodeData.path });
        }
      });

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);

        node
          .attr('cx', d => d.x)
          .attr('cy', d => d.y);

        label
          .attr('x', d => d.x)
          .attr('y', d => d.y - 12);
      });

      function drag(simulation) {
        function dragstarted(event, d) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        }
        function dragged(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        }
        function dragended(event, d) {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        }
        return d3.drag()
          .on('start', dragstarted)
          .on('drag', dragged)
          .on('end', dragended);
      }
    }

    function showStats(stats) {
      const container = document.createElement('div');

      function addRow(label, value) {
        const p = document.createElement('p');
        const strong = document.createElement('strong');
        strong.textContent = label + ': ';
        p.appendChild(strong);
        p.appendChild(document.createTextNode(value));
        container.appendChild(p);
      }

      addRow('Path', stats.path);
      addRow('Type', stats.type);

      if (stats.size != null) {
        addRow('Size', formatBytes(stats.size));
      }
      if (stats.lineCount != null && stats.lineCount > 0) {
        addRow('Lines', String(stats.lineCount));
      }
      if (stats.modifiedAt) {
        addRow('Modified', new Date(stats.modifiedAt).toLocaleString());
      }
      if (stats.createdAt) {
        addRow('Created', new Date(stats.createdAt).toLocaleString());
      }
      if (stats.childCount != null) {
        addRow('Children', String(stats.childCount));
      }

      if (stats.gitInfo) {
        const h3 = document.createElement('h3');
        h3.textContent = 'Git Info';
        container.appendChild(h3);
        addRow('Author', stats.gitInfo.author);
        addRow('Commits', String(stats.gitInfo.commitCount));
        addRow('Last Modified', stats.gitInfo.lastModified);
      }

      if (stats.dependencies && Object.keys(stats.dependencies).length > 0) {
        const h3 = document.createElement('h3');
        h3.textContent = 'Dependencies (' + Object.keys(stats.dependencies).length + ')';
        container.appendChild(h3);

        const ul = document.createElement('ul');
        ul.className = 'dep-list';

        for (const [importPath, resolvedPath] of Object.entries(stats.dependencies)) {
          const li = document.createElement('li');

          const importSpan = document.createElement('span');
          importSpan.className = 'dep-import';
          importSpan.textContent = importPath;
          li.appendChild(importSpan);

          if (resolvedPath) {
            const resolvedSpan = document.createElement('span');
            resolvedSpan.className = 'dep-resolved';
            resolvedSpan.textContent = '→ ' + resolvedPath;
            li.appendChild(resolvedSpan);
          } else {
            const unresolvedSpan = document.createElement('span');
            unresolvedSpan.className = 'dep-unresolved';
            unresolvedSpan.textContent = 'external / unresolved';
            li.appendChild(unresolvedSpan);
          }

          ul.appendChild(li);
        }
        container.appendChild(ul);
      }

      // Show circular dependencies if this file is involved in any
      if (circularDeps.length > 0) {
        const involvedCycles = circularDeps.filter(cycle => cycle.includes(stats.path));
        if (involvedCycles.length > 0) {
          const h3 = document.createElement('h3');
          h3.textContent = '⚠️ Circular Dependencies (' + involvedCycles.length + ')';
          h3.style.color = '#d94949';
          container.appendChild(h3);

          for (const cycle of involvedCycles) {
            const cycleDiv = document.createElement('div');
            cycleDiv.style.fontSize = '11px';
            cycleDiv.style.padding = '6px';
            cycleDiv.style.background = 'rgba(217, 73, 73, 0.1)';
            cycleDiv.style.borderRadius = '4px';
            cycleDiv.style.marginBottom = '6px';
            cycleDiv.style.wordBreak = 'break-all';
            cycleDiv.textContent = cycle.join(' → ') + ' → ' + cycle[0];
            container.appendChild(cycleDiv);
          }
        }
      }

      if (stats.preview) {
        const h3 = document.createElement('h3');
        h3.textContent = 'Preview';
        container.appendChild(h3);
        const pre = document.createElement('pre');
        pre.textContent = stats.preview;
        container.appendChild(pre);
      }

      detailContent.innerHTML = '';
      detailContent.appendChild(container);
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
  </script>
</body>
</html>
