<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https: data:; script-src 'nonce-{{nonce}}' https://d3js.org; style-src 'nonce-{{nonce}}'; connect-src https:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showy Project Map</title>
  <script nonce="{{nonce}}" src="https://d3js.org/d3.v7.min.js"></script>
  <style nonce="{{nonce}}">
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d30;
      --text-primary: #cccccc;
      --text-secondary: #9cdcfe;
      --accent-blue: #0e639c;
      --accent-blue-hover: #1177bb;
      --border-color: rgba(255,255,255,0.1);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      font-size: 20px;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      background: var(--accent-blue);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--accent-blue-hover);
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    button.secondary:hover {
      background: var(--bg-tertiary);
    }
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #visualization {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    #tree-svg {
      width: 100%;
      height: 100%;
    }
    #details-panel {
      width: 320px;
      background: var(--bg-primary);
      border-left: 1px solid var(--border-color);
      overflow-y: auto;
      padding: 20px;
      flex-shrink: 0;
    }
    #details-panel h2 {
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }
    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .detail-label {
      color: #888;
    }
    .detail-value {
      color: var(--text-primary);
      text-align: right;
      word-break: break-all;
    }
    .dep-list {
      list-style: none;
      margin-top: 8px;
    }
    .dep-item {
      padding: 8px;
      margin: 4px 0;
      background: var(--bg-tertiary);
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .dep-import {
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }
    .dep-resolved {
      color: #6a9955;
      font-size: 11px;
    }
    .dep-unresolved {
      color: #888;
      font-size: 11px;
      font-style: italic;
    }
    .circular-warning {
      background: rgba(217, 73, 73, 0.1);
      border-left: 3px solid #d94949;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 12px;
    }
    .circular-warning-title {
      color: #d94949;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .status-bar {
      padding: 8px 20px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
    }
    .node-circle {
      cursor: pointer;
      transition: all 0.2s;
    }
    .node-circle:hover {
      stroke: rgba(255,255,255,0.8);
      stroke-width: 3px;
    }
    .node-label {
      font-size: 11px;
      fill: var(--text-primary);
      pointer-events: none;
      user-select: none;
    }
    .link-line {
      stroke: rgba(100,150,200,0.3);
      stroke-width: 1.5px;
      fill: none;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      text-align: center;
      padding: 40px;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state-text {
      font-size: 14px;
      margin-bottom: 8px;
    }
    .empty-state-subtext {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1><span class="logo">🌳</span> Showy</h1>
    <div class="controls">
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>
  
  <div class="main-container">
    <div id="visualization">
      <svg id="tree-svg"></svg>
    </div>
    
    <div id="details-panel">
      <h2>Details</h2>
      <div id="details-content">
        <div class="empty-state">
          <div class="empty-state-icon">📄</div>
          <div class="empty-state-text">Select a file to see details</div>
          <div class="empty-state-subtext">Click on any node in the tree</div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="status-bar" id="statusBar">Loading project tree...</div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const svg = d3.select('#tree-svg');
    const detailsContent = document.getElementById('details-content');
    const statusBar = document.getElementById('statusBar');
    const refreshBtn = document.getElementById('refreshBtn');
    
    let treeData = null;
    let circularDeps = [];
    let root = null;
    let treeLayout = null;
    let g = null;
    let zoom = null;
    let nodeIdCounter = 0; // For generating unique node IDs

    refreshBtn.addEventListener('click', () => {
      vscode.postMessage({ command: 'refresh' });
      statusBar.textContent = 'Refreshing...';
    });

    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.type) {
        case 'treeData':
          treeData = message.tree;
          renderTree();
          break;
        case 'graphData':
          // Store for potential future use
          break;
        case 'circularDependencies':
          circularDeps = message.circles;
          if (circularDeps.length > 0) {
            statusBar.textContent = `⚠️ Found ${circularDeps.length} circular ${circularDeps.length === 1 ? 'dependency' : 'dependencies'}`;
          }
          break;
        case 'nodeStats':
          showDetails(message.stats);
          break;
        case 'status':
          statusBar.textContent = message.text;
          break;
      }
    });

    vscode.postMessage({ command: 'ready' });

    function renderTree() {
      if (!treeData || treeData.length === 0) {
        svg.html('<text x="50%" y="50%" text-anchor="middle" fill="#888">No workspace folder open</text>');
        return;
      }

      const container = svg.node().parentElement;
      const width = container.clientWidth;
      const height = container.clientHeight;

      svg.selectAll('*').remove();
      svg.attr('width', width).attr('height', height);

      // Merge all workspace folders into a single root
      const mergedRoot = {
        name: 'Workspace',
        type: 'folder',
        path: '',
        children: treeData
      };

      // Build hierarchy from tree data
      root = d3.hierarchy(mergedRoot, d => d.children);
      
      // Collapse all children initially except first level
      root.descendants().forEach(d => {
        if (d.depth > 1 && d.children) {
          d._children = d.children;
          d.children = null;
        }
      });
      
      // Create tree layout
      treeLayout = d3.tree()
        .size([width - 100, height - 100])
        .separation((a, b) => (a.parent === b.parent ? 1 : 1.2));

      g = svg.append('g')
        .attr('transform', 'translate(50, 50)');

      // Add zoom behavior (only once)
      // Add zoom behavior (initialize once, reset transform on full refresh)
      if (!zoom) {
        zoom = d3.zoom()
          .scaleExtent([0.1, 3])
          .on('zoom', (event) => {
            g.attr('transform', event.transform);
          });
        svg.call(zoom);
      }
      
      // Reset zoom transform to initial position
      svg.call(zoom.transform, d3.zoomIdentity.translate(50, 50));

      updateTree(root);
    }

    function updateTree(source) {
      if (!root || !treeLayout || !g) return;

      const duration = 300;

      // Compute the new tree layout
      treeLayout(root);

      const nodes = root.descendants();
      const links = root.links();

      // Update links
      const link = g.selectAll('.link-line')
        .data(links, d => d.target.id || (d.target.id = ++nodeIdCounter));

      link.exit().transition().duration(duration)
        .attr('opacity', 0)
        .remove();

      const linkEnter = link.enter().append('path')
        .attr('class', 'link-line')
        .attr('d', d3.linkVertical()
          .x(d => source ? source.x : d.x)
          .y(d => source ? source.y : d.y))
        .attr('opacity', 0);

      link.merge(linkEnter)
        .transition().duration(duration)
        .attr('opacity', 1)
        .attr('d', d3.linkVertical()
          .x(d => d.x)
          .y(d => d.y));

      // Update nodes
      const node = g.selectAll('.node-group')
        .data(nodes, d => d.id || (d.id = ++nodeIdCounter));

      const nodeExit = node.exit();
      
      nodeExit.transition().duration(duration)
        .attr('transform', d => source ? `translate(${source.x},${source.y})` : `translate(${d.x},${d.y})`)
        .attr('opacity', 0)
        .remove();

      const nodeEnter = node.enter().append('g')
        .attr('class', 'node-group')
        .attr('transform', d => `translate(${d.x},${d.y})`)
        .attr('opacity', 0);

      nodeEnter.append('circle')
        .attr('class', 'node-circle')
        .attr('r', d => d.data.type === 'folder' ? 8 : 6)
        .attr('fill', d => getNodeColor(d))
        .attr('stroke', '#fff')
        .attr('stroke-width', 2)
        .style('cursor', 'pointer')
        .on('click', (event, d) => {
          if (d.data.type === 'folder') {
            if (d._children) {
              d.children = d._children;
              d._children = null;
            } else if (d.children) {
              d._children = d.children;
              d.children = null;
            }
            updateTree(d);
          }
          if (d.data.path) {
            vscode.postMessage({ command: 'nodeSelected', path: d.data.path });
          }
        });

      nodeEnter.append('text')
        .attr('class', 'node-label')
        .attr('dy', -12)
        .attr('text-anchor', 'middle')
        .text(d => d.data.name.length > 20 ? d.data.name.substring(0, 17) + '...' : d.data.name);

      // Add expand/collapse indicator for folders
      nodeEnter.filter(d => d.data.type === 'folder')
        .append('text')
        .attr('class', 'folder-indicator')
        .attr('text-anchor', 'middle')
        .attr('dy', 4)
        .attr('font-size', '10px')
        .attr('fill', '#fff')
        .text(d => d._children ? '▶' : '▼');

      const nodeUpdate = node.merge(nodeEnter);

      nodeUpdate.transition().duration(duration)
        .attr('transform', d => `translate(${d.x},${d.y})`)
        .attr('opacity', 1);

      nodeUpdate.select('circle')
        .attr('fill', d => getNodeColor(d));

      nodeUpdate.select('.folder-indicator')
        .text(d => d._children ? '▶' : '▼');

      statusBar.textContent = `Showing ${nodes.length} items`;
    }

    function getNodeColor(d) {
      if (d.data.type === 'folder') {
        return d._children ? '#4a7f95' : '#6a9fb5';
      }
      // Color based on file extension
      const parts = d.data.name.split('.');
      if (parts.length < 2) return '#b8a538'; // No extension
      const ext = parts[parts.length - 1].toLowerCase();
      if (['ts', 'tsx', 'js', 'jsx'].includes(ext)) return '#3178c6';
      if (['py'].includes(ext)) return '#3776ab';
      if (['cpp', 'c', 'h', 'hpp'].includes(ext)) return '#00599c';
      return '#b8a538';
    }

    function showDetails(stats) {
      detailsContent.innerHTML = '';

      function addRow(container, label, value) {
        const row = document.createElement('div');
        row.className = 'detail-row';
        
        const labelSpan = document.createElement('span');
        labelSpan.className = 'detail-label';
        labelSpan.textContent = label;
        
        const valueSpan = document.createElement('span');
        valueSpan.className = 'detail-value';
        valueSpan.textContent = value;
        
        row.appendChild(labelSpan);
        row.appendChild(valueSpan);
        container.appendChild(row);
      }

      // File Information Section
      const fileSection = document.createElement('div');
      fileSection.className = 'detail-section';
      
      const fileTitle = document.createElement('h3');
      fileTitle.textContent = 'File Information';
      fileSection.appendChild(fileTitle);

      const fileName = stats.path.split(/[/\\]/).pop();
      addRow(fileSection, 'Name', fileName);
      addRow(fileSection, 'Type', stats.type);
      
      if (stats.size != null) {
        addRow(fileSection, 'Size', formatBytes(stats.size));
      }
      if (stats.lineCount != null && stats.lineCount > 0) {
        addRow(fileSection, 'Lines', String(stats.lineCount));
      }
      if (stats.modifiedAt) {
        addRow(fileSection, 'Modified', new Date(stats.modifiedAt).toLocaleDateString());
      }
      if (stats.createdAt) {
        addRow(fileSection, 'Created', new Date(stats.createdAt).toLocaleDateString());
      }
      
      detailsContent.appendChild(fileSection);

      // Git Information Section
      if (stats.gitInfo) {
        const gitSection = document.createElement('div');
        gitSection.className = 'detail-section';
        
        const gitTitle = document.createElement('h3');
        gitTitle.textContent = 'Git Information';
        gitSection.appendChild(gitTitle);

        addRow(gitSection, 'Author', stats.gitInfo.author);
        addRow(gitSection, 'Commits', String(stats.gitInfo.commitCount));
        
        detailsContent.appendChild(gitSection);
      }

      // Dependencies Section
      if (stats.dependencies && Object.keys(stats.dependencies).length > 0) {
        const depSection = document.createElement('div');
        depSection.className = 'detail-section';
        
        const depTitle = document.createElement('h3');
        depTitle.textContent = `Dependencies (${Object.keys(stats.dependencies).length})`;
        depSection.appendChild(depTitle);

        const depList = document.createElement('ul');
        depList.className = 'dep-list';

        for (const [importPath, resolvedPath] of Object.entries(stats.dependencies)) {
          const depItem = document.createElement('li');
          depItem.className = 'dep-item';

          const importSpan = document.createElement('span');
          importSpan.className = 'dep-import';
          importSpan.textContent = importPath;
          depItem.appendChild(importSpan);

          if (resolvedPath) {
            const resolvedSpan = document.createElement('span');
            resolvedSpan.className = 'dep-resolved';
            resolvedSpan.textContent = '→ ' + resolvedPath.split(/[/\\]/).pop();
            depItem.appendChild(resolvedSpan);
          } else {
            const unresolvedSpan = document.createElement('span');
            unresolvedSpan.className = 'dep-unresolved';
            unresolvedSpan.textContent = 'external';
            depItem.appendChild(unresolvedSpan);
          }

          depList.appendChild(depItem);
        }

        depSection.appendChild(depList);
        detailsContent.appendChild(depSection);
      }

      // Circular Dependencies Warning
      if (circularDeps.length > 0) {
        const involvedCycles = circularDeps.filter(cycle => cycle.includes(stats.path));
        if (involvedCycles.length > 0) {
          const circularSection = document.createElement('div');
          circularSection.className = 'detail-section';

          const warningDiv = document.createElement('div');
          warningDiv.className = 'circular-warning';

          const warningTitle = document.createElement('div');
          warningTitle.className = 'circular-warning-title';
          warningTitle.textContent = `⚠️ Circular Dependencies (${involvedCycles.length})`;
          warningDiv.appendChild(warningTitle);

          for (const cycle of involvedCycles) {
            const cycleDiv = document.createElement('div');
            cycleDiv.style.marginTop = '8px';
            cycleDiv.style.fontSize = '11px';
            cycleDiv.textContent = cycle.map(p => p.split(/[/\\]/).pop()).join(' → ');
            warningDiv.appendChild(cycleDiv);
          }

          circularSection.appendChild(warningDiv);
          detailsContent.appendChild(circularSection);
        }
      }

      // File Preview Section
      if (stats.preview) {
        const previewSection = document.createElement('div');
        previewSection.className = 'detail-section';
        
        const previewTitle = document.createElement('h3');
        previewTitle.textContent = 'Preview';
        previewSection.appendChild(previewTitle);

        const previewPre = document.createElement('pre');
        previewPre.style.background = 'var(--bg-tertiary)';
        previewPre.style.padding = '12px';
        previewPre.style.borderRadius = '4px';
        previewPre.style.fontSize = '11px';
        previewPre.style.overflow = 'auto';
        previewPre.style.maxHeight = '200px';
        previewPre.style.fontFamily = "'Consolas', 'Monaco', monospace";
        previewPre.textContent = stats.preview;
        
        previewSection.appendChild(previewPre);
        detailsContent.appendChild(previewSection);
      }
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Handle window resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (treeData && root) {
          // Just update the tree layout size, don't rebuild everything
          const container = svg.node().parentElement;
          const width = container.clientWidth;
          const height = container.clientHeight;
          
          svg.attr('width', width).attr('height', height);
          
          treeLayout.size([width - 100, height - 100]);
          updateTree(root);
        }
      }, 250);
    });
  </script>
</body>
</html>
