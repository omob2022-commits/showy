<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https: data:; script-src 'nonce-{{nonce}}' https://d3js.org; style-src 'nonce-{{nonce}}'; connect-src https:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showy Project Map</title>
  <script nonce="{{nonce}}" src="https://d3js.org/d3.v7.min.js"></script>
  <style nonce="{{nonce}}">
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d30;
      --text-primary: #cccccc;
      --text-secondary: #9cdcfe;
      --accent-blue: #0e639c;
      --accent-blue-hover: #1177bb;
      --border-color: rgba(255,255,255,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--accent-blue);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover { background: var(--accent-blue-hover); }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    button.secondary:hover { background: var(--bg-tertiary); }
    .main-container { display: flex; flex: 1; overflow: hidden; }
    #visualization {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    #tree-svg { width: 100%; height: 100%; }
    #details-panel {
      width: 320px;
      background: var(--bg-primary);
      border-left: 1px solid var(--border-color);
      overflow-y: auto;
      padding: 20px;
      flex-shrink: 0;
    }
    #details-panel h2 {
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .detail-label { color: #888; }
    .detail-value { color: var(--text-primary); text-align: right; word-break: break-all; }
    .dep-list { list-style: none; margin-top: 8px; }
    .dep-item {
      padding: 8px;
      margin: 4px 0;
      background: var(--bg-tertiary);
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .dep-import { color: var(--text-secondary); display: block; margin-bottom: 4px; }
    .dep-resolved { color: #6a9955; font-size: 11px; }
    .dep-unresolved { color: #888; font-size: 11px; font-style: italic; }
    .circular-warning {
      background: rgba(217,73,73,0.1);
      border-left: 3px solid #d94949;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 12px;
    }
    .circular-warning-title { color: #d94949; font-weight: 600; margin-bottom: 8px; }
    .status-bar {
      padding: 8px 20px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
    }
    /* node-circle hover is on the group now, but keep for visual feedback */
    .node-group { cursor: pointer; }
    .node-group:hover circle { stroke: rgba(255,255,255,0.8); stroke-width: 3px; }
    .node-label {
      font-size: 11px;
      fill: var(--text-primary);
      pointer-events: none;
      user-select: none;
    }
    .folder-indicator {
      pointer-events: none; /* FIX: never block clicks on the group */
      user-select: none;
    }
    .link-line { stroke: rgba(100,150,200,0.3); stroke-width: 1.5px; fill: none; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      text-align: center;
      padding: 40px;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state-text { font-size: 14px; margin-bottom: 8px; }
    .empty-state-subtext { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1><span class="logo">🌳</span> Showy</h1>
    <div class="controls">
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <div class="main-container">
    <div id="visualization">
      <svg id="tree-svg"></svg>
    </div>
    <div id="details-panel">
      <h2>Details</h2>
      <div id="details-content">
        <div class="empty-state">
          <div class="empty-state-icon">📄</div>
          <div class="empty-state-text">Select a file to see details</div>
          <div class="empty-state-subtext">Click on any node in the tree</div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Loading project tree...</div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const svg = d3.select('#tree-svg');
    const detailsContent = document.getElementById('details-content');
    const statusBar = document.getElementById('statusBar');
    const refreshBtn = document.getElementById('refreshBtn');

    let treeData = null;
    let circularDeps = [];
    let root = null;
    let treeLayout = null;
    let g = null;
    let zoom = null;
    let nodeIdCounter = 0; // unique IDs for D3 key functions

    refreshBtn.addEventListener('click', () => {
      vscode.postMessage({ command: 'refresh' });
      statusBar.textContent = 'Refreshing...';
    });

    window.addEventListener('message', event => {
      const msg = event.data;
      switch (msg.type) {
        case 'treeData':
          treeData = msg.tree;
          renderTree();
          break;
        case 'graphData':
          break; // reserved for future graph view
        case 'circularDependencies':
          circularDeps = msg.circles;
          if (circularDeps.length > 0) {
            statusBar.textContent = `⚠️ Found ${circularDeps.length} circular ${circularDeps.length === 1 ? 'dependency' : 'dependencies'}`;
          }
          break;
        case 'nodeStats':
          showDetails(msg.stats);
          break;
        case 'status':
          statusBar.textContent = msg.text;
          break;
      }
    });

    vscode.postMessage({ command: 'ready' });

    // ─── renderTree: full rebuild on new data or refresh ───────────────────────
    function renderTree() {
      if (!treeData || treeData.length === 0) {
        svg.html('<text x="50%" y="50%" text-anchor="middle" fill="#888">No workspace folder open</text>');
        return;
      }

      const container = svg.node().parentElement;
      const width = container.clientWidth;
      const height = container.clientHeight;

      svg.selectAll('*').remove();
      svg.attr('width', width).attr('height', height);

      // Merge all workspace roots under a single synthetic node
      const mergedRoot = {
        name: 'Workspace',
        type: 'folder',
        path: '', // intentionally empty — guarded in click handler
        children: treeData
      };

      root = d3.hierarchy(mergedRoot, d => d.children);

      // Collapse everything beyond depth 1 on first load
      root.descendants().forEach(d => {
        if (d.depth > 1 && d.children) {
          d._children = d.children;
          d.children = null;
        }
      });

      // HORIZONTAL layout: size([vertical-spread, horizontal-spread])
      // Note the argument order is [y-extent, x-extent] because we swap axes
      treeLayout = d3.tree()
        .size([height - 80, width - 260])
        .separation((a, b) => a.parent === b.parent ? 1 : 1.5);

      g = svg.append('g');

      // Initialise zoom once; reset transform to home on every full refresh
      if (!zoom) {
        zoom = d3.zoom()
          .scaleExtent([0.1, 3])
          .on('zoom', event => g.attr('transform', event.transform));
        svg.call(zoom);
      }
      svg.call(zoom.transform, d3.zoomIdentity.translate(40, 40));

      updateTree(root);
    }

    // ─── updateTree: in-place D3 update, preserves expand/collapse state ──────
    function updateTree(source) {
      if (!root || !treeLayout || !g) return;

      const duration = 250;
      treeLayout(root);

      const nodes = root.descendants();
      const links = root.links();

      // Helper: horizontal link path generator (axes swapped)
      const linkGen = d3.linkHorizontal()
        .x(d => d.y)   // d.y = horizontal position in horizontal tree
        .y(d => d.x);  // d.x = vertical position in horizontal tree

      // ── Links ──────────────────────────────────────────────────────────────
      const link = g.selectAll('.link-line')
        .data(links, d => d.target.id || (d.target.id = ++nodeIdCounter));

      link.exit().transition().duration(duration)
        .attr('opacity', 0).remove();

      const linkEnter = link.enter().append('path')
        .attr('class', 'link-line')
        // Set initial `d` so SVG never renders a broken path mid-transition
        .attr('d', linkGen)
        .attr('opacity', 0);

      link.merge(linkEnter)
        .transition().duration(duration)
        .attr('opacity', 1)
        .attr('d', linkGen);

      // ── Nodes ──────────────────────────────────────────────────────────────
      const node = g.selectAll('.node-group')
        .data(nodes, d => d.id || (d.id = ++nodeIdCounter));

      // Exit: animate collapsing children toward their parent
      node.exit()
        .transition().duration(duration)
        .attr('transform', source ? `translate(${source.y},${source.x})` : null)
        .attr('opacity', 0)
        .remove();

      const nodeEnter = node.enter().append('g')
        .attr('class', 'node-group')
        // Enter from source position for a smooth expand animation
        .attr('transform', source ? `translate(${source.y},${source.x})` : `translate(0,0)`)
        .attr('opacity', 0)
        // FIX: click on the GROUP so center and edge both work
        .on('click', (event, d) => {
          if (d.data.type === 'folder') {
            if (d._children) {
              d.children = d._children;
              d._children = null;
            } else if (d.children) {
              d._children = d.children;
              d.children = null;
            }
            updateTree(d);
          }
          // Guard: synthetic Workspace node has no path
          if (d.data.path) {
            vscode.postMessage({ command: 'nodeSelected', path: d.data.path });
          }
        });

      nodeEnter.append('circle')
        .attr('r', d => d.data.type === 'folder' ? 8 : 5)
        .attr('fill', getNodeColor)
        .attr('stroke', '#fff')
        .attr('stroke-width', 1.5);

      // Label to the RIGHT of the node (horizontal layout)
      nodeEnter.append('text')
        .attr('class', 'node-label')
        .attr('dx', 14)
        .attr('dy', 4)
        .attr('text-anchor', 'start')
        .text(d => {
          const n = d.data.name;
          return n.length > 25 ? n.substring(0, 22) + '…' : n;
        });

      // Expand/collapse indicator — sits LEFT of the circle, never intercepts clicks
      nodeEnter.filter(d => d.data.type === 'folder')
        .append('text')
        .attr('class', 'folder-indicator')
        .attr('dx', -14)
        .attr('dy', 4)
        .attr('text-anchor', 'middle')
        .attr('font-size', '9px')
        .attr('fill', 'rgba(255,255,255,0.55)')
        .text(d => d._children ? '▶' : '▼');

      // ── Merge & animate to final positions ─────────────────────────────────
      const nodeUpdate = node.merge(nodeEnter);

      nodeUpdate.transition().duration(duration)
        // HORIZONTAL: translate(d.y, d.x)
        .attr('transform', d => `translate(${d.y},${d.x})`)
        .attr('opacity', 1);

      nodeUpdate.select('circle').attr('fill', getNodeColor);
      nodeUpdate.select('.folder-indicator').text(d => d._children ? '▶' : '▼');

      statusBar.textContent = `Showing ${nodes.length} items`;
    }

    // ─── Node colour by file type ──────────────────────────────────────────────
    function getNodeColor(d) {
      if (d.data.type === 'folder') return d._children ? '#4a7f95' : '#6a9fb5';
      const parts = d.data.name.split('.');
      if (parts.length < 2) return '#b8a538';
      const ext = parts[parts.length - 1].toLowerCase();
      if (['ts', 'tsx', 'js', 'jsx', 'mjs', 'cjs'].includes(ext)) return '#3178c6';
      if (['py', 'pyw'].includes(ext))                              return '#3776ab';
      if (['cpp', 'c', 'h', 'hpp', 'cc', 'cxx'].includes(ext))    return '#00599c';
      if (['json', 'yaml', 'yml', 'toml'].includes(ext))           return '#cb8b3e';
      if (['md', 'txt', 'rst'].includes(ext))                      return '#6a9955';
      if (['css', 'scss', 'sass', 'less'].includes(ext))           return '#563d7c';
      if (['html', 'htm', 'xml', 'svg'].includes(ext))             return '#e44d26';
      if (['sh', 'bash', 'zsh', 'ps1'].includes(ext))              return '#89e051';
      return '#b8a538';
    }

    // ─── Details panel ────────────────────────────────────────────────────────
    function showDetails(stats) {
      detailsContent.innerHTML = '';

      function addRow(container, label, value) {
        const row = document.createElement('div');
        row.className = 'detail-row';
        const lbl = document.createElement('span');
        lbl.className = 'detail-label';
        lbl.textContent = label;
        const val = document.createElement('span');
        val.className = 'detail-value';
        val.textContent = value;
        row.appendChild(lbl);
        row.appendChild(val);
        container.appendChild(row);
      }

      function addSection(title) {
        const sec = document.createElement('div');
        sec.className = 'detail-section';
        if (title) {
          const h3 = document.createElement('h3');
          h3.textContent = title;
          sec.appendChild(h3);
        }
        detailsContent.appendChild(sec);
        return sec;
      }

      // File Information
      const fileSection = addSection('File Information');
      addRow(fileSection, 'Name', stats.path.split(/[/\\]/).pop());
      addRow(fileSection, 'Type', stats.type);
      if (stats.size != null)                       addRow(fileSection, 'Size',     formatBytes(stats.size));
      if (stats.lineCount > 0)                      addRow(fileSection, 'Lines',    String(stats.lineCount));
      if (stats.modifiedAt)                         addRow(fileSection, 'Modified', new Date(stats.modifiedAt).toLocaleDateString());
      if (stats.createdAt)                          addRow(fileSection, 'Created',  new Date(stats.createdAt).toLocaleDateString());
      if (stats.childCount != null)                 addRow(fileSection, 'Children', String(stats.childCount));

      // Git Information
      if (stats.gitInfo) {
        const gitSection = addSection('Git Information');
        addRow(gitSection, 'Author',        stats.gitInfo.author);
        addRow(gitSection, 'Commits',       String(stats.gitInfo.commitCount));
        addRow(gitSection, 'Last Modified', stats.gitInfo.lastModified);
      }

      // Dependencies
      if (stats.dependencies && Object.keys(stats.dependencies).length > 0) {
        const depSection = addSection(`Dependencies (${Object.keys(stats.dependencies).length})`);
        const ul = document.createElement('ul');
        ul.className = 'dep-list';
        for (const [importPath, resolvedPath] of Object.entries(stats.dependencies)) {
          const li = document.createElement('li');
          li.className = 'dep-item';
          const imp = document.createElement('span');
          imp.className = 'dep-import';
          imp.textContent = importPath;
          li.appendChild(imp);
          const res = document.createElement('span');
          res.className = resolvedPath ? 'dep-resolved' : 'dep-unresolved';
          res.textContent = resolvedPath ? '→ ' + resolvedPath.split(/[/\\]/).pop() : 'external';
          li.appendChild(res);
          ul.appendChild(li);
        }
        depSection.appendChild(ul);
      }

      // Circular Dependencies
      if (circularDeps.length > 0) {
        const cycles = circularDeps.filter(c => c.includes(stats.path));
        if (cycles.length > 0) {
          const sec = addSection('');
          const warn = document.createElement('div');
          warn.className = 'circular-warning';
          const title = document.createElement('div');
          title.className = 'circular-warning-title';
          title.textContent = `⚠️ Circular Dependencies (${cycles.length})`;
          warn.appendChild(title);
          for (const cycle of cycles) {
            const div = document.createElement('div');
            div.style.cssText = 'margin-top:8px;font-size:11px;';
            div.textContent = cycle.map(p => p.split(/[/\\]/).pop()).join(' → ');
            warn.appendChild(div);
          }
          sec.appendChild(warn);
        }
      }

      // File Preview
      if (stats.preview) {
        const sec = addSection('Preview');
        const pre = document.createElement('pre');
        pre.style.cssText = 'background:var(--bg-tertiary);padding:12px;border-radius:4px;font-size:11px;overflow:auto;max-height:200px;font-family:Consolas,Monaco,monospace;white-space:pre-wrap;';
        pre.textContent = stats.preview;
        sec.appendChild(pre);
      }
    }

    // ─── Utilities ─────────────────────────────────────────────────────────────
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const idx = Math.floor(Math.log(bytes) / Math.log(k)); // renamed: was `i`, clashed with nodeIdCounter
      return parseFloat((bytes / Math.pow(k, idx)).toFixed(2)) + ' ' + sizes[idx];
    }

    // Debounced resize — updates layout size only, zoom state preserved
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (treeData && root && treeLayout) {
          const container = svg.node().parentElement;
          const width = container.clientWidth;
          const height = container.clientHeight;
          svg.attr('width', width).attr('height', height);
          treeLayout.size([height - 80, width - 260]);
          updateTree(root);
        }
      }, 250);
    });
  </script>
</body>
</html>
